<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stick Figure Animator</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1a1a2e;color:#eee;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;height:100vh;overflow:hidden}
  h1{font-size:24px;margin-bottom:8px;color:#e94560}
  .container{display:flex;gap:20px;flex:1;width:100%;max-width:1200px;min-height:0}
  .canvas-area{flex:2;display:flex;flex-direction:column;align-items:center;background:#16213e;border-radius:12px;padding:10px;min-height:0}
  canvas{background:#0f3460;border-radius:8px;flex:1;width:100%;min-height:0;display:block}
  .controls{flex:1;display:flex;flex-direction:column;gap:10px;background:#16213e;border-radius:12px;padding:15px;min-height:0;overflow-y:auto}
  .btn{background:#e94560;color:#fff;border:none;padding:12px 20px;border-radius:8px;cursor:pointer;font-size:16px;font-weight:bold;transition:.2s}
  .btn:hover{background:#c73650;transform:scale(1.02)}
  .btn-sm{background:#533483;padding:8px 14px;font-size:13px}
  .btn-sm:hover{background:#6b44a0}
  .btn-green{background:#2ecc71}
  .btn-green:hover{background:#27ae60}
  .info{background:#1a1a2e;border-radius:8px;padding:10px;font-size:13px;line-height:1.5}
  .info span{color:#e94560;font-weight:bold}
  .controls-row{display:flex;gap:8px;flex-wrap:wrap}
  .frame-counter{font-size:28px;font-weight:bold;text-align:center;color:#e94560;margin:5px 0}
  .pose-name{text-align:center;font-size:16px;color:#aaa;margin-bottom:5px;font-style:italic}
  .chat-box{background:#16213e;border-radius:12px;padding:15px;position:fixed;bottom:20px;right:20px;width:320px;max-height:400px;display:flex;flex-direction:column;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5)}
  .chat-box h3{font-size:14px;color:#e94560;margin-bottom:8px}
  .chat-messages{flex:1;overflow-y:auto;max-height:250px;font-size:13px;margin-bottom:8px;padding-right:5px}
  .chat-messages div{margin-bottom:4px;word-break:break-word}
  .chat-messages .peer{color:#2ecc71}
  .chat-messages .self{color:#e94560}
  .chat-input-row{display:flex;gap:6px}
  .chat-input-row input{flex:1;padding:8px;border-radius:6px;border:none;background:#1a1a2e;color:#fff;font-size:13px}
  .chat-input-row button{background:#533483;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px}
  .chat-toggle{position:fixed;bottom:20px;right:20px;width:40px;height:40px;border-radius:50%;background:#e94560;color:#fff;border:none;font-size:20px;cursor:pointer;z-index:101;box-shadow:0 2px 10px rgba(0,0,0,.5)}
  .share-btn{background:#1da1f2;border:none;color:#fff;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:bold}
  .share-btn:hover{background:#1a91da}
</style>
</head>
<body>

<h1>🧍 Stick Figure Animator</h1>

<div class="container">
  <div class="canvas-area">
    <canvas id="canvas"></canvas>
  </div>
  <div class="controls">
    <button class="btn" id="nextBtn">▶ Next Frame</button>
    <div class="frame-counter" id="frameCounter">Frame 1 / 30</div>
    <div class="pose-name" id="poseName">Walking — left stride</div>
    <div class="controls-row">
      <button class="btn btn-sm" id="resetBtn">↺ Reset</button>
      <button class="btn btn-sm btn-green" id="autoBtn">▶ Play</button>
    </div>
    <div class="info">
      <div>🖱 Click <span>Next Frame</span> to advance the animation one step</div>
      <div>🎬 Click <span>Play</span> to auto-play</div>
      <div style="margin-top:6px">Walking → Stand → Sit → Stand → Walk</div>
    </div>
  </div>
</div>

<div id="chatBox" class="chat-box" style="display:none">
  <h3>💬 Chat</h3>
  <div id="chatMessages" class="chat-messages"></div>
  <div class="chat-input-row">
    <input id="chatInput" placeholder="Say something..." />
    <button id="chatSend">Send</button>
  </div>
</div>
<button id="chatToggle" class="chat-toggle">💬</button>

<script>
// ===== RELAY / CHAT CONFIG =====
const DEFAULT_RELAY = 'wss://jump-learners-efforts-midwest.trycloudflare.com';
const ROOM = new URLSearchParams(location.search).get('room') || 'default';
const RELAY = DEFAULT_RELAY;
const COLORS = ['#e94560','#2ecc71','#3498db','#f39c12','#9b59b6','#1abc9c'];
let myId = localStorage.getItem('chatId') || Math.random().toString(36).substr(2,4).toUpperCase();
localStorage.setItem('chatId', myId);
let conn = null, peers = {}, myColor = COLORS[myId.charCodeAt(0)%COLORS.length];

function connectRelay() {
  conn = new WebSocket(RELAY);
  conn.onopen = () => {
    console.log('Connected');
    conn.send(JSON.stringify({type:'join',room:ROOM,id:myId,label:'You'}));
    keepAlive();
  };
  conn.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if(msg.type==='peers') {
        peers={};
        msg.peers.forEach(p=>peers[p]=true);
      } else if(msg.type==='chat') {
        addChatMessage(msg.id, msg.text, msg.from === myId ? 'self' : 'peer');
      } else if(msg.type==='update') {
        if(msg.id !== myId) {
          tryApplyCode(msg.code);
          frame = msg.frame || 1;
          updateUI();
        }
      } else if(msg.type==='frame') {
        if(msg.id !== myId) {
          frame = msg.frame;
          updateUI();
          draw();
        }
      }
    } catch(e) {}
  };
  conn.onclose = () => { setTimeout(connectRelay, 2000); };
}
let keepAliveInterval;
function keepAlive() {
  clearInterval(keepAliveInterval);
  keepAliveInterval = setInterval(() => {
    conn && conn.send(JSON.stringify({type:'ping'}));
  }, 15000);
}
function sendFrame(f) {
  if(conn && conn.readyState === WebSocket.OPEN) {
    conn.send(JSON.stringify({type:'frame', room:ROOM, id:myId, frame:f}));
  }
}
function sendCode(code) {
  if(conn && conn.readyState === WebSocket.OPEN) {
    conn.send(JSON.stringify({type:'update', room:ROOM, id:myId, code:code, frame:frame}));
  }
}
function sendChat(text) {
  if(conn && conn.readyState === WebSocket.OPEN) {
    conn.send(JSON.stringify({type:'chat', room:ROOM, id:myId, text}));
    addChatMessage(myId, text, 'self');
  }
}
function addChatMessage(id, text, type) {
  const el = document.getElementById('chatMessages');
  const d = document.createElement('div');
  d.className = type;
  d.textContent = `${type==='self'?'You':id}: ${text}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

// ===== STICK FIGURE ANIMATION =====
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = canvas.clientWidth || rect.width - 20;
  canvas.height = canvas.clientHeight || rect.height - 20;
}
window.addEventListener('resize', resize);
setTimeout(resize, 50);

// ===== ANIMATION FRAMES =====
// Each frame defines angles (degrees) for: headTilt, bodyLean, leftUpperArm, leftForearm, rightUpperArm, rightForearm, leftUpperLeg, leftLowerLeg, rightUpperLeg, rightLowerLeg
// Also: hipOffset (vertical shift), footOffset (y shift for grounded feel)

// Key: all angles from vertical, positive = forward (right), negative = backward (left)

const FRAMES = [];

// === WALKING CYCLE (12 frames, 0-11) ===
function addWalkFrames() {
  const steps = 12;
  for (let i = 0; i < steps; i++) {
    const t = i / steps; // 0 to 1
    const phase = t * Math.PI * 2; // full cycle

    // Body bob (up on toe-off, down on mid-stride)
    const bodyBob = Math.sin(phase) * 3;
    // Head counter-bob
    const headTilt = Math.sin(phase + Math.PI) * 2;

    // Arms swing opposite to legs
    const leftArmSwing = Math.sin(phase + Math.PI) * 25;
    const rightArmSwing = Math.sin(phase) * 25;

    // Elbows bend slightly
    const leftForeBend = Math.abs(Math.sin(phase + Math.PI)) * 20 + 5;
    const rightForeBend = Math.abs(Math.sin(phase)) * 20 + 5;

    // Legs
    const leftLeg = Math.sin(phase + Math.PI) * 30;
    const rightLeg = Math.sin(phase) * 30;

    // Knees bend on swing-through
    const leftKneeBend = Math.max(0, Math.sin(phase + Math.PI)) * 20;
    const rightKneeBend = Math.max(0, Math.sin(phase)) * 20;

    FRAMES.push({
      name: i === 0 ? 'Right stride' : i === 3 ? 'Mid stride' : i === 6 ? 'Left stride' : i === 9 ? 'Mid stride' : 'Walking',
      headTilt, bodyLean: Math.sin(phase) * 2,
      leftUpperArm: 160 + rightArmSwing, leftForearm: leftForeBend,
      rightUpperArm: 160 + leftArmSwing, rightForearm: rightForeBend,
      leftUpperLeg: 180 + leftLeg, leftLowerLeg: leftKneeBend,
      rightUpperLeg: 180 + rightLeg, rightLowerLeg: rightKneeBend,
      hipOffset: bodyBob
    });
  }
}
addWalkFrames();

// === WALK TO STAND TRANSITION (2 frames, 12-13) ===
FRAMES.push({
  name: 'Slowing down', headTilt:0, bodyLean:0,
  leftUpperArm:160, leftForearm:10,
  rightUpperArm:160, rightForearm:10,
  leftUpperLeg:180, leftLowerLeg:0,
  rightUpperLeg:180, rightLowerLeg:0,
  hipOffset:0
});
FRAMES.push({
  name: 'Standing', headTilt:0, bodyLean:0,
  leftUpperArm:165, leftForearm:5,
  rightUpperArm:165, rightForearm:5,
  leftUpperLeg:180, leftLowerLeg:0,
  rightUpperLeg:180, rightLowerLeg:0,
  hipOffset:0
});

// === STANDING STILL (1 frame, 14) ===

// === STAND TO SIT TRANSITION (6 frames, 15-20) ===
for (let i = 0; i < 6; i++) {
  const t = (i + 1) / 6;
  // Knees bend, hips drop, torso tilts slightly forward
  const kneeBend = t * 60;
  const hipDrop = t * 30;
  const lean = t * 5;
  // Arms go forward slightly
  const armFwd = t * 20;

  FRAMES.push({
    name: i < 2 ? 'Bending knees' : i < 4 ? 'Lowering down' : 'Almost seated',
    headTilt: t * 3, bodyLean: lean,
    leftUpperArm: 160 - armFwd, leftForearm: 10 + t * 15,
    rightUpperArm: 160 - armFwd, rightForearm: 10 + t * 15,
    leftUpperLeg: 180 + kneeBend, leftLowerLeg: kneeBend * 0.6,
    rightUpperLeg: 180 + kneeBend, rightLowerLeg: kneeBend * 0.6,
    hipOffset: -hipDrop
  });
}

// === SITTING (2 frames, 21-22) ===
FRAMES.push({
  name: 'Sitting', headTilt:3, bodyLean:5,
  leftUpperArm:140, leftForearm:25,
  rightUpperArm:140, rightForearm:25,
  leftUpperLeg:240, leftLowerLeg:35,
  rightUpperLeg:240, rightLowerLeg:35,
  hipOffset:-30
});
FRAMES.push({
  name: 'Comfy sitting', headTilt:5, bodyLean:3,
  leftUpperArm:135, leftForearm:30,
  rightUpperArm:135, rightForearm:30,
  leftUpperLeg:240, leftLowerLeg:35,
  rightUpperLeg:240, rightLowerLeg:35,
  hipOffset:-30
});

// === SIT TO STAND TRANSITION (6 frames, 23-28) ===
for (let i = 5; i >= 0; i--) {
  const t = (i + 1) / 6;
  // Reverse of sit-down
  const kneeBend = t * 60;
  const hipDrop = t * 30;
  const lean = t * 5;
  const armFwd = t * 20;

  FRAMES.push({
    name: i >= 4 ? 'Standing up' : i >= 2 ? 'Rising' : 'Almost up',
    headTilt: t * 3, bodyLean: lean,
    leftUpperArm: 160 - armFwd, leftForearm: 10 + t * 15,
    rightUpperArm: 160 - armFwd, rightForearm: 10 + t * 15,
    leftUpperLeg: 180 + kneeBend, leftLowerLeg: kneeBend * 0.6,
    rightUpperLeg: 180 + kneeBend, rightLowerLeg: kneeBend * 0.6,
    hipOffset: -hipDrop
  });
}

// === BACK TO STANDING (1 frame, 29) ===
FRAMES.push({
  name: 'Standing', headTilt:0, bodyLean:0,
  leftUpperArm:165, leftForearm:5,
  rightUpperArm:165, rightForearm:5,
  leftUpperLeg:180, leftLowerLeg:0,
  rightUpperLeg:180, rightLowerLeg:0,
  hipOffset:0
});

const TOTAL_FRAMES = FRAMES.length;
let frame = 1;
let isPlaying = false;
let playInterval = null;

function degToRad(d) { return d * Math.PI / 180; }

function drawStickFigure(f) {
  const idx = (f - 1 + TOTAL_FRAMES) % TOTAL_FRAMES;
  const data = FRAMES[idx];
  if (!data) return;

  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Center position
  const cx = w / 2;
  const baseY = h * 0.78;
  const scale = Math.min(w, h) / 400;

  // Body segments
  const headR = 16 * scale;
  const neckLen = 8 * scale;
  const torsoLen = 55 * scale;
  const upperArmLen = 25 * scale;
  const forearmLen = 22 * scale;
  const upperLegLen = 28 * scale;
  const lowerLegLen = 28 * scale;

  // Hip position (adjusted for body bob / sitting)
  const hipY = baseY - lowerLegLen * 2 - upperLegLen * 1.8 + data.hipOffset * scale;
  // Neck base
  const neckBaseY = hipY - torsoLen;
  // Head center
  const headY = neckBaseY - neckLen - headR;

  function drawLimb(x1, y1, angleDeg, len, color='#eee', width=3) {
    const angle = degToRad(angleDeg);
    const x2 = x1 + Math.sin(angle) * len;
    const y2 = y1 + Math.cos(angle) * len;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = color;
    ctx.lineWidth = width * scale;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Joint circle
    ctx.beginPath();
    ctx.arc(x2, y2, 3 * scale, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    return {x: x2, y: y2};
  }

  function drawJoint(x, y, r=3) {
    ctx.beginPath();
    ctx.arc(x, y, r * scale, 0, Math.PI * 2);
    ctx.fillStyle = '#eee';
    ctx.fill();
  }

  // Head
  ctx.beginPath();
  ctx.arc(cx, headY, headR, 0, Math.PI * 2);
  ctx.strokeStyle = '#eee';
  ctx.lineWidth = 2.5 * scale;
  ctx.stroke();

  // Head tilt on neck
  const neckTopY = headY + headR;
  const tiltRad = degToRad(data.headTilt);
  const neckTopX = cx + Math.sin(tiltRad) * headR * 0.3;

  // Neck
  ctx.beginPath();
  ctx.moveTo(neckTopX, neckTopY);
  ctx.lineTo(cx, neckBaseY);
  ctx.strokeStyle = '#eee';
  ctx.lineWidth = 3 * scale;
  ctx.stroke();

  // Body lean
  const bodyRad = degToRad(data.bodyLean);
  const shoulderX = cx + Math.sin(bodyRad) * torsoLen * 0.1;
  const shoulderY = neckBaseY;

  // Torso
  ctx.beginPath();
  ctx.moveTo(cx, neckBaseY);
  ctx.lineTo(cx + Math.sin(bodyRad) * torsoLen, hipY);
  ctx.lineWidth = 4 * scale;
  ctx.stroke();

  // Shoulder joint
  const shX = cx + Math.sin(bodyRad) * torsoLen * 0.15;
  const shY = neckBaseY + torsoLen * 0.12;

  // Left arm (from shoulder)
  const lShoulder = drawLimb(shX, shY, data.leftUpperArm, upperArmLen);
  drawLimb(lShoulder.x, lShoulder.y, data.leftUpperArm + 160 + data.leftForearm, forearmLen, '#eee', 2.5);

  // Right arm (from shoulder)
  const rShoulder = drawLimb(shX, shY, data.rightUpperArm, upperArmLen);
  drawLimb(rShoulder.x, rShoulder.y, data.rightUpperArm + 160 + data.rightForearm, forearmLen, '#eee', 2.5);

  // Hip joint
  const hipX = cx + Math.sin(bodyRad) * torsoLen;
  const hipJointY = hipY;

  // Left leg
  // For sitting, adjust hip position
  const lLegStart = drawLimb(hipX - 5 * scale, hipJointY, data.leftUpperLeg, upperLegLen);
  drawLimb(lLegStart.x, lLegStart.y, data.leftUpperLeg + 180 + data.leftLowerLeg, lowerLegLen, '#eee', 3);

  // Right leg
  const rLegStart = drawLimb(hipX + 5 * scale, hipJointY, data.rightUpperLeg, upperLegLen);
  drawLimb(rLegStart.x, rLegStart.y, data.rightUpperLeg + 180 + data.rightLowerLeg, lowerLegLen, '#eee', 3);

  // Ground line
  const groundY = baseY + 5 * scale;
  ctx.beginPath();
  ctx.moveTo(cx - 80 * scale, groundY);
  ctx.lineTo(cx + 80 * scale, groundY);
  ctx.strokeStyle = '#4a6fa5';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.stroke();
  ctx.setLineDash([]);
}

function draw() {
  resize();
  drawStickFigure(frame);
}

let codeTimeout = null;
function tryApplyCode(c) {
  // Not applicable for this app - just draw
}

function sendFrameSync() {
  sendFrame(frame);
}

function updateUI() {
  document.getElementById('frameCounter').textContent = `Frame ${frame} / ${TOTAL_FRAMES}`;
  const idx = (frame - 1 + TOTAL_FRAMES) % TOTAL_FRAMES;
  document.getElementById('poseName').textContent = FRAMES[idx]?.name || '';
}

// Next frame
document.getElementById('nextBtn').addEventListener('click', () => {
  if (isPlaying) { stopPlay(); }
  frame = (frame % TOTAL_FRAMES) + 1;
  draw();
  updateUI();
  sendFrameSync();
});

// Reset
document.getElementById('resetBtn').addEventListener('click', () => {
  if (isPlaying) { stopPlay(); }
  frame = 1;
  draw();
  updateUI();
  sendFrameSync();
});

// Auto play
function startPlay() {
  isPlaying = true;
  document.getElementById('autoBtn').textContent = '⏸ Pause';
  playInterval = setInterval(() => {
    frame = (frame % TOTAL_FRAMES) + 1;
    draw();
    updateUI();
    sendFrameSync();
  }, 150);
}
function stopPlay() {
  isPlaying = false;
  document.getElementById('autoBtn').textContent = '▶ Play';
  clearInterval(playInterval);
}
document.getElementById('autoBtn').addEventListener('click', () => {
  if (isPlaying) { stopPlay(); }
  else { startPlay(); }
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ' || e.key === 'ArrowRight') {
    e.preventDefault();
    document.getElementById('nextBtn').click();
  }
  if (e.key === 'r') document.getElementById('resetBtn').click();
  if (e.key === 'p') document.getElementById('autoBtn').click();
});

// Chat toggle
const chatToggle = document.getElementById('chatToggle');
const chatBox = document.getElementById('chatBox');
let chatVisible = false;
chatToggle.addEventListener('click', () => {
  chatVisible = !chatVisible;
  chatBox.style.display = chatVisible ? 'flex' : 'none';
  chatToggle.textContent = chatVisible ? '✕' : '💬';
  if (chatVisible) chatToggle.style.right = '350px';
  else chatToggle.style.right = '20px';
});
document.getElementById('chatSend').addEventListener('click', () => {
  const input = document.getElementById('chatInput');
  if (input.value.trim()) {
    sendChat(input.value.trim());
    input.value = '';
  }
});
document.getElementById('chatInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('chatSend').click();
});

// Init
connectRelay();
draw();
updateUI();

// Sync frame from other users
let lastRemoteFrame = 0;
</script>
</body>
</html>
