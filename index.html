<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Code — Real-time HTML/CSS/JS + Python</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1e1e1e;color:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Toolbar */
.toolbar{background:#2d2d2d;padding:8px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #444;flex-shrink:0;flex-wrap:wrap;min-height:48px}
.toolbar .logo{font-weight:700;font-size:15px;color:#ff6b6b;letter-spacing:.5px}
.toolbar .sep{width:1px;height:22px;background:#444;display:inline-block}
.toolbar .status{font-size:12px;padding:3px 10px;border-radius:4px}
.toolbar .status.live{background:#1a3a1a;color:#4ade80}
.toolbar .status.connecting{background:#3a3320;color:#f9e2af}
.toolbar .status.offline{background:#3a1a1a;color:#f87171}
.toolbar .status.relay-unconfigured{background:#2a2a2a;color:#888}
.toolbar .room-input{background:#1e1e1e;border:1px solid #444;color:#eee;padding:4px 8px;border-radius:4px;font-size:12px;outline:none;width:180px}
.toolbar .room-input:focus{border-color:#ff6b6b}
.toolbar .room-input::placeholder{color:#666}
.toolbar .peer-count{font-size:11px;color:#888}
.toolbar button{background:#444;border:none;color:#eee;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;transition:background .15s}
.toolbar button:hover{background:#555}
.toolbar button.primary{background:#ff6b6b}
.toolbar button.primary:hover{background:#e05555}
.toolbar .spacer{flex:1}
.toolbar .share-btn{background:transparent;border:1px solid #555;padding:4px 10px;border-radius:4px;color:#aaa;cursor:pointer;font-size:11px}
.toolbar .share-btn:hover{border-color:#ff6b6b;color:#fff}

/* Main split */
.main-split{flex:1;display:flex;overflow:hidden;min-height:0}
@media(max-width:768px){.main-split{flex-direction:column}}

/* Editor */
.editor-pane{width:55%;display:flex;flex-direction:column;border-right:1px solid #333;overflow:hidden}
@media(max-width:768px){.editor-pane{width:100%;height:50%;border-right:none;border-bottom:1px solid #333}}

.editor-header{background:#252525;padding:5px 10px;font-size:11px;color:#888;display:flex;align-items:center;gap:8px;border-bottom:1px solid #333;flex-shrink:0}
.editor-header span{font-weight:600;font-size:12px;color:#ccc}
.editor-header .mode-tabs{display:flex;gap:0;margin-left:12px}
.editor-header .mode-tab{padding:3px 12px;font-size:11px;border:1px solid #444;background:transparent;color:#888;cursor:pointer;transition:all .15s;border-radius:0}
.editor-header .mode-tab:first-child{border-radius:4px 0 0 4px}
.editor-header .mode-tab:last-child{border-radius:0 4px 4px 0}
.editor-header .mode-tab.active{background:#ff6b6b;color:#fff;border-color:#ff6b6b}
.editor-header .mode-tab:hover:not(.active){background:#333}
.editor-header .py-status{font-size:10px;color:#888;margin-left:6px}
.editor-header .py-status.ready{color:#4ade80}

.editor-wrap{flex:1;display:flex;min-height:0}
.gutter{width:40px;background:#1e1e1e;color:#555;text-align:right;padding:8px 4px;font-family:'Cascadia Code','Courier New',monospace;font-size:13px;line-height:1.5;overflow:hidden;user-select:none;flex-shrink:0;border-right:1px solid #2a2a2a}
.gutter div{padding-right:6px}
textarea{flex:1;background:transparent;border:none;outline:none;resize:none;color:#d4d4d4;font-family:'Cascadia Code','Courier New',monospace;font-size:13px;line-height:1.5;padding:8px 10px;tab-size:2;white-space:pre;overflow:auto}
textarea::placeholder{color:#555}

/* Preview */
.preview-pane{flex:1;display:flex;flex-direction:column;overflow:hidden}
@media(max-width:768px){.preview-pane{width:100%;height:50%}}
.preview-header{background:#252525;padding:5px 10px;font-size:11px;color:#888;display:flex;align-items:center;border-bottom:1px solid #333;flex-shrink:0}
.preview-header span{font-weight:600;font-size:12px;color:#ccc}
.preview-header .run-btn{margin-left:auto;background:#2ea043;border:none;color:#fff;padding:3px 10px;border-radius:3px;cursor:pointer;font-size:11px}
.preview-header .run-btn:hover{background:#3fb950}
.preview-header .reset-btn{background:transparent;border:1px solid #555;color:#aaa;padding:3px 8px;border-radius:3px;cursor:pointer;font-size:10px;margin-left:6px}
.preview-header .reset-btn:hover{color:#eee}
iframe{flex:1;width:100%;border:none;background:#fff}
.py-output{flex:1;width:100%;border:none;background:#0d1117;color:#c9d1d9;font-family:'Cascadia Code','Courier New',monospace;font-size:13px;line-height:1.5;padding:12px;overflow:auto;display:none;white-space:pre-wrap;word-break:break-all}
.py-output .py-prompt{color:#58a6ff}
.py-output .py-stdout{color:#c9d1d9}
.py-output .py-stderr{color:#f85149}
.py-output .py-loading{color:#d29922;font-style:italic}
.py-output .py-cursor{display:inline-block;width:8px;height:15px;background:#58a6ff;animation:blink 1s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes blink{50%{opacity:0}}

/* Share modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#2d2d2d;border:1px solid #444;border-radius:12px;padding:24px;max-width:360px;width:90%;text-align:center}
.modal h3{color:#ff6b6b;margin-bottom:12px;font-size:16px}
.modal .url-box{background:#1e1e1e;border:1px solid #444;border-radius:6px;padding:8px 10px;font-size:12px;color:#ccc;word-break:break-all;margin-bottom:14px;user-select:all;text-align:left}
.modal .qr-wrap{display:flex;justify-content:center;margin-bottom:14px;min-height:128px}
.modal .qr-wrap canvas,.modal .qr-wrap img{border-radius:8px;background:#fff;padding:6px}
.modal button{background:#ff6b6b;border:none;color:#fff;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:13px;margin:4px}
.modal button:hover{background:#e05555}
.modal button.secondary{background:#444;color:#eee}
.modal button.secondary:hover{background:#555}
.modal .close-x{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:4px;line-height:1}

/* Chat panel */
.chat-panel{background:#252525;border-top:1px solid #333;flex-shrink:0;max-height:200px;display:flex;flex-direction:column;transition:max-height .25s}
.chat-panel.collapsed{max-height:36px}
.chat-header{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;border-bottom:1px solid #333;flex-shrink:0;user-select:none;}
.chat-header span{font-size:12px;font-weight:600;color:#aaa}
.chat-header .chat-toggle{font-size:10px;color:#666;margin-left:auto;transition:transform .25s}
.chat-panel.collapsed .chat-toggle{transform:rotate(-90deg)}
.chat-body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.chat-msgs{flex:1;overflow-y:auto;padding:6px 10px;font-size:13px;line-height:1.4;min-height:0}
.chat-msgs .msg{margin-bottom:3px;word-break:break-word}
.chat-msgs .msg .sender{color:#ff6b6b;font-weight:600;font-size:11px}
.chat-msgs .msg .time{color:#555;font-size:10px;margin-left:4px}
.chat-msgs .msg .text{color:#ccc}
.chat-msgs .system{color:#666;font-size:11px;text-align:center;padding:2px 0;font-style:italic}
.chat-input-row{display:flex;align-items:center;gap:4px;padding:4px 8px;border-top:1px solid #333;flex-shrink:0}
.chat-input-row input{flex:1;background:#1e1e1e;border:1px solid #444;border-radius:4px;color:#eee;padding:5px 8px;font-size:12px;outline:none}
.chat-input-row input:focus{border-color:#ff6b6b}
.chat-input-row .send-btn{background:#ff6b6b;border:none;color:#fff;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
.chat-input-row .send-btn:hover{background:#e05555}
.chat-input-row .emoji-btn{background:transparent;border:none;color:#888;cursor:pointer;font-size:16px;padding:2px 4px;line-height:1}
.chat-input-row .emoji-btn:hover{color:#fff}
.chat-emoji-picker{display:none;gap:2px;padding:4px 8px;border-top:1px solid #333;flex-shrink:0;flex-wrap:wrap}
.chat-emoji-picker.open{display:flex}
.chat-emoji-picker button{background:transparent;border:none;font-size:18px;cursor:pointer;padding:2px 5px;border-radius:3px;line-height:1}
.chat-emoji-picker button:hover{background:#333}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#444}
</style>
</head>
<body>

<div class="toolbar">
  <div class="logo">&lt;/&gt; Live Code</div>
  <div class="sep"></div>
  <div class="status offline" id="statusBadge">offline</div>
  <input class="room-input" id="roomInput" placeholder="Room name..." spellcheck="false">
  <button class="primary" onclick="joinRoom()">Join / Create</button>
  <span class="peer-count" id="peerCount"></span>
  <span class="spacer"></span>
  <button class="share-btn" onclick="shareRoom()" title="Share room link">🔗 Share</button>
</div>

<div class="main-split">
  <div class="editor-pane">
    <div class="editor-header">
      <span>✏️ Code</span>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="html" onclick="setMode('html')">HTML</button>
        <button class="mode-tab" data-mode="python" onclick="setMode('python')">Python</button>
      </div>
      <span class="py-status" id="pyStatus"></span>
    </div>
    <div class="editor-wrap">
      <div class="gutter" id="gutter"></div>
      <textarea id="editor" spellcheck="false" placeholder="Write code here..." class="code-textarea"></textarea>
    </div>
  </div>
  <div class="preview-pane">
    <div class="preview-header">
      <span>🔍 Preview</span>
      <button class="reset-btn" onclick="resetDefault()">↺ Default</button>
      <button class="run-btn" onclick="runPreview()">&#9654; Run</button>
    </div>
    <iframe id="preview" sandbox="allow-scripts allow-modals"></iframe>
    <div class="py-output" id="pyOutput"><span class="py-prompt">>>> </span><span class="py-cursor"></span></div>
  </div>
</div>

<!-- Chat panel -->
<div class="chat-panel" id="chatPanel">
  <div class="chat-header" onclick="toggleChat()">
    <span>💬 Chat</span>
    <span style="font-size:11px;color:#666" id="chatUserCount"></span>
    <span class="chat-toggle" id="chatToggle">▾</span>
  </div>
  <div class="chat-body">
    <div class="chat-msgs" id="chatMessages"></div>
    <div class="chat-emoji-picker" id="emojiPicker">
      <button onclick="addEmoji('😂')">😂</button>
      <button onclick="addEmoji('👍')">👍</button>
      <button onclick="addEmoji('🔥')">🔥</button>
      <button onclick="addEmoji('👀')">👀</button>
      <button onclick="addEmoji('🎨')">🎨</button>
      <button onclick="addEmoji('✅')">✅</button>
      <button onclick="addEmoji('💀')">💀</button>
      <button onclick="addEmoji('🥫')">🥫</button>
    </div>
    <div class="chat-input-row">
      <button class="emoji-btn" onclick="toggleEmoji()">😊</button>
      <input type="text" id="chatInput" placeholder="Message..." maxlength="500" onkeydown="onChatKey(event)">
      <button class="send-btn" onclick="sendChat()">Send</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="shareModal">
  <div class="modal" style="position:relative">
    <button class="close-x" onclick="closeShareModal()">&times;</button>
    <h3>🔗 Share Room</h3>
    <div class="url-box" id="shareUrlDisplay">Loading...</div>
    <div class="qr-wrap" id="qrcode"></div>
    <button onclick="copyShareLink()">📋 Copy Link</button>
    <button class="secondary" onclick="closeShareModal()">Close</button>
  </div>
</div>

<script>
// ===== CONFIG =====
const DEFAULT_RELAY = "wss://jump-learners-efforts-midwest.trycloudflare.com";
const PYODIDE_CDN = "https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js";

// ===== STATE =====
const DEFAULT_CODE = {
  html: `<!DOCTYPE html>
<html>
<head>
  <title>Live Code</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #1a1a2e; color: #eee; }
    h1 { color: #ff6b6b; }
  </style>
</head>
<body>
  <h1>Hello, world!</h1>
  <p>Edit and everyone sees it live.</p>
  <script>
    console.log('Live Code ready!');
  <\/script>
</body>
</html>`,
  python: `# Python mode — runs in browser via Pyodide (WebAssembly)
import math
import random

print("🎉 Python on GitHub Pages!")
print(f"Pi is roughly {math.pi:.4f}")

# Make a simple list
items = [random.randint(1, 100) for _ in range(5)]
print(f"Random numbers: {items}")
print(f"Sum: {sum(items)}, Avg: {sum(items)/len(items):.1f}")`
};

let editor = document.getElementById('editor');
let preview = document.getElementById('preview');
let pyOutput = document.getElementById('pyOutput');
let gutter = document.getElementById('gutter');
let statusBadge = document.getElementById('statusBadge');
let peerCount = document.getElementById('peerCount');
let roomInput = document.getElementById('roomInput');
let pyStatus = document.getElementById('pyStatus');

let currentCode = DEFAULT_CODE.html;
let currentMode = 'html';
let ws = null;
let roomId = '';
let userId = '';
let broadcastTimer = null;
let lastEditAt = 0;
let reconnectTimer = null;
let reconnectDelay = 1000;
let isReconnecting = false;
let pyodideReady = false;
let pyodide = null;
let pendingPyCode = null;

const BROADCAST_DEBOUNCE = 300;
const REMOTE_SUPPRESS_WINDOW = 1500;
const RECONNECT_MAX_DELAY = 15000;

// ===== PYODIDE =====
function loadPyodideRuntime() {
  if (pyodideReady) return Promise.resolve();
  if (window.__pyodideLoading) return window.__pyodideLoading;

  pyStatus.textContent = '⏳ loading...';

  window.__pyodideLoading = new Promise(async (resolve) => {
    try {
      // Load the Pyodide script
      const script = document.createElement('script');
      script.src = PYODIDE_CDN;
      script.onload = async () => {
        try {
          pyodide = await globalThis.loadPyodide({
            indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/'
          });
          pyodideReady = true;
          pyStatus.textContent = '✓ ready';
          pyStatus.className = 'py-status ready';
          pyOutput.innerHTML = '<span class="py-prompt">>>> </span><span class="py-stdout">Python ready! Run your code.</span>\n<span class="py-prompt">>>> </span><span class="py-cursor"></span>';

          if (pendingPyCode) {
            executePython(pendingPyCode);
            pendingPyCode = null;
          }
          resolve();
        } catch (e) {
          pyStatus.textContent = '✗ load failed';
          pyOutput.innerHTML = '<span class="py-stderr">Failed to load Python: ' + escHtml(e.message) + '</span>';
          resolve();
        }
      };
      script.onerror = () => {
        pyStatus.textContent = '✗ network error';
        pyOutput.innerHTML = '<span class="py-stderr">Failed to download Pyodide from CDN. Check your internet connection.</span>';
        resolve();
      };
      document.head.appendChild(script);
    } catch (e) {
      pyStatus.textContent = '✗ error';
      resolve();
    }
  });

  return window.__pyodideLoading;
}

function executePython(code) {
  if (!pyodideReady || !pyodide) {
    pendingPyCode = code;
    loadPyodideRuntime();
    pyOutput.innerHTML = '<span class="py-loading">⏳ Loading Python runtime (first time only)...</span><span class="py-cursor"></span>';
    return;
  }

  pyOutput.innerHTML = '<span class="py-prompt">>>> </span><span class="py-stdout">Running...</span>';

  // Redirect stdout/stderr
  try {
    pyodide.runPython(`
import sys
from io import StringIO
_stdout = StringIO()
_stderr = StringIO()
sys.stdout = _stdout
sys.stderr = _stderr
`);
    pyodide.runPython(code);
    const stdout = pyodide.runPython('_stdout.getvalue()');
    const stderr = pyodide.runPython('_stderr.getvalue()');
    pyodide.runPython("sys.stdout = sys.__stdout__; sys.stderr = sys.__stderr__");

    let html = '';
    if (stdout) {
      html += escHtml(stdout).split('\n').map(l => '<span class="py-stdout">' + l + '</span>').join('\n');
    }
    if (stderr) {
      if (html) html += '\n';
      html += escHtml(stderr).split('\n').map(l => '<span class="py-stderr">' + l + '</span>').join('\n');
    }
    if (!stdout && !stderr) {
      html = '<span class="py-stdout" style="color:#666">(no output)</span>';
    }
    pyOutput.innerHTML = html + '\n<span class="py-prompt">>>> </span><span class="py-cursor"></span>';
  } catch (e) {
    const msg = e.message || String(e);
    pyOutput.innerHTML = '<span class="py-stderr">' + escHtml(msg) + '</span>\n<span class="py-prompt">>>> </span><span class="py-cursor"></span>';
    try { pyodide.runPython("sys.stdout = sys.__stdout__; sys.stderr = sys.__stderr__"); } catch(_) {}
  }
}

// ===== MODE SWITCHING =====
function setMode(mode) {
  if (mode === currentMode) return;

  // Save current code for this mode
  const storageKey = 'livecode:' + getRoomKey() + ':mode:' + currentMode;
  try { localStorage.setItem(storageKey, currentCode); } catch(e) {}

  currentMode = mode;

  // Update tab buttons
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });

  // Show/hide preview elements
  if (mode === 'html') {
    preview.style.display = '';
    pyOutput.style.display = 'none';
  } else {
    preview.style.display = 'none';
    pyOutput.style.display = 'block';
    loadPyodideRuntime();
  }

  // Load saved code for this mode
  const savedKey = 'livecode:' + getRoomKey() + ':mode:' + mode;
  let code;
  try { code = localStorage.getItem(savedKey) || DEFAULT_CODE[mode]; } catch(e) { code = DEFAULT_CODE[mode]; }

  currentCode = code;
  editor.value = code;
  updateGutter();

  if (mode === 'html') {
    runPreview();
  } else {
    // For Python, auto-run on switch if there's code
    if (code.trim()) {
      executePython(code);
    }
  }

  // Broadcast mode change
  sendUpdate(currentCode);
}

// ===== HELPERS =====
function getRoomKey() {
  return roomId || 'local';
}

function getStorageKey() {
  return 'livecode:' + getRoomKey() + ':mode:' + currentMode;
}

function loadCache() {
  try {
    const k = getStorageKey();
    const v = localStorage.getItem(k);
    if (v) currentCode = v;
    else {
      const fallback = DEFAULT_CODE[currentMode];
      if (fallback) currentCode = fallback;
    }
  } catch(e) {}
}

function saveCache() {
  try {
    localStorage.setItem(getStorageKey(), currentCode);
  } catch(e) {}
}

function updateGutter() {
  const lines = editor.value.split('\n').length;
  let html = '';
  for (let i = 1; i <= lines; i++) html += '<div>' + i + '</div>';
  gutter.innerHTML = html;
}

function runPreview() {
  if (currentMode === 'python') {
    executePython(editor.value);
    return;
  }
  preview.srcdoc = editor.value;
}

function setStatus(text, cls) {
  statusBadge.textContent = text;
  statusBadge.className = 'status ' + (cls || 'offline');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ===== WEBRTC-ISH RELAY — WebSocket to a tiny relay server =====
function getRelayUrl() {
  return DEFAULT_RELAY && !DEFAULT_RELAY.includes('YOUR-DEPLOYED') ? DEFAULT_RELAY : null;
}

function connectRelay() {
  if (ws) {
    try { ws.close(); } catch(e) {}
    ws = null;
  }
  clearTimeout(reconnectTimer);

  if (!roomId) {
    setStatus('no room', 'offline');
    return;
  }

  const url = getRelayUrl();
  if (!url) {
    setStatus('local only', 'relay-unconfigured');
    return;
  }

  setStatus('connecting…', 'connecting');
  if (isReconnecting) {
    updatePeerCount(null);
  }

  try {
    ws = new WebSocket(url);
  } catch(e) {
    setStatus('relay error', 'offline');
    return;
  }

  ws.onopen = () => {
    isReconnecting = false;
    reconnectDelay = 1000;
    ws.send(JSON.stringify({ type: 'join', room: roomId }));
  };

  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    switch (msg.type) {
      case 'init':
        if (msg.code != null) {
          applyRemoteCode(msg.code);
        } else {
          sendUpdate(currentCode);
        }
        break;
      case 'update':
        applyRemoteCode(msg.code);
        break;
      case 'peers':
        updatePeerCount(msg.count);
        break;
      case 'chat':
        if (msg.data && msg.data.sender !== userId) {
          addMessage(msg.data.sender, msg.data.text, msg.data.timestamp);
        }
        break;
    }
  };

  ws.onclose = () => {
    setStatus('reconnecting…', 'connecting');
    isReconnecting = true;
    scheduleReconnect();
  };

  ws.onerror = () => {
    if (!isReconnecting) {
      setStatus('connection error', 'connecting');
    }
  };
}

function updatePeerCount(count) {
  if (count != null) {
    const label = count === 1 ? '1 here' : count + ' here';
    setStatus('live · ' + label, 'live');
    peerCount.textContent = count > 0 ? '(' + count + ')' : '';
    chatUserCount.textContent = count > 0 ? '(' + count + ')' : '';
  } else {
    peerCount.textContent = '';
    chatUserCount.textContent = '';
  }
}

function scheduleReconnect() {
  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(() => {
    reconnectDelay = Math.min(reconnectDelay * 1.5, RECONNECT_MAX_DELAY);
    connectRelay();
  }, reconnectDelay);
}

function sendUpdate(code) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'update', room: roomId, code, mode: currentMode }));
  }
}

// ===== CODE EDITING =====
function applyRemoteCode(code) {
  if (code == null || code === editor.value) return;
  if (Date.now() - lastEditAt < REMOTE_SUPPRESS_WINDOW) return;

  const hadFocus = document.activeElement === editor;
  editor.value = code;
  currentCode = code;
  saveCache();
  updateGutter();
  runPreview();
  if (hadFocus) {
    editor.selectionStart = editor.selectionEnd = editor.value.length;
  }
}

editor.addEventListener('input', () => {
  lastEditAt = Date.now();
  currentCode = editor.value;
  saveCache();
  updateGutter();

  clearTimeout(broadcastTimer);
  broadcastTimer = setTimeout(() => {
    runPreview();
    sendUpdate(currentCode);
  }, BROADCAST_DEBOUNCE);
});

editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, en = editor.selectionEnd;
    editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(en);
    editor.selectionStart = editor.selectionEnd = s + 2;
    editor.dispatchEvent(new Event('input'));
  }
  // Run on Ctrl+Enter
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    runPreview();
  }
});

// ===== ROOM MANAGEMENT =====
function joinRoom() {
  const name = roomInput.value.trim();
  if (!name) {
    alert('Enter a room name');
    return;
  }
  roomId = name;
  userId = Math.random().toString(36).slice(2, 6);
  loadCache();
  editor.value = currentCode;
  updateGutter();
  runPreview();
  connectRelay();
  document.title = 'Live Code — ' + roomId;
  peerCount.textContent = '';
}

function resetDefault() {
  currentCode = DEFAULT_CODE[currentMode] || '';
  editor.value = currentCode;
  saveCache();
  updateGutter();
  runPreview();
  sendUpdate(currentCode);
}

// ===== SHARE =====
function shareRoom() {
  if (!roomId) {
    alert('Join or create a room first');
    return;
  }
  const url = location.origin + location.pathname + '?room=' + encodeURIComponent(roomId);
  document.getElementById('shareUrlDisplay').textContent = url;
  document.getElementById('shareModal').classList.add('open');

  const qr = document.getElementById('qrcode');
  qr.innerHTML = '';
  if (typeof QRCode !== 'undefined') {
    new QRCode(qr, { text: url, width: 128, height: 128 });
  }
}

function closeShareModal() {
  document.getElementById('shareModal').classList.remove('open');
}

function copyShareLink() {
  const url = document.getElementById('shareUrlDisplay').textContent;
  navigator.clipboard.writeText(url).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
  alert('Link copied!');
}

document.getElementById('shareModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeShareModal();
});

// ===== CHAT =====
let chatMessagesEl = document.getElementById('chatMessages');
let chatInput = document.getElementById('chatInput');
let chatToggle = document.getElementById('chatToggle');
let emojiPicker = document.getElementById('emojiPicker');
let chatUserCount = document.getElementById('chatUserCount');
let msgSet = new Set();

function addMessage(sender, text, timestamp, isSystem) {
  const key = sender + '|' + text + '|' + (timestamp || Date.now());
  if (msgSet.has(key)) return;
  msgSet.add(key);
  if (msgSet.size > 200) msgSet.clear();

  const div = document.createElement('div');
  if (isSystem) {
    div.className = 'system';
    div.textContent = text;
  } else {
    div.className = 'msg';
    const t = timestamp ? new Date(timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
    div.innerHTML = '<span class="sender">' + escHtml(sender) + '</span><span class="time">' + t + '</span> <span class="text">' + escHtml(text) + '</span>';
  }
  chatMessagesEl.appendChild(div);
  chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
}

function sendChat() {
  const text = chatInput.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  const sender = 'me';
  const timestamp = Date.now();
  addMessage(sender, text, timestamp);
  ws.send(JSON.stringify({ type: 'chat', data: { sender: userId, text, timestamp } }));
  chatInput.value = '';
  emojiPicker.classList.remove('open');
}

function onChatKey(e) {
  if (e.key === 'Enter') sendChat();
}

function toggleChat() {
  document.getElementById('chatPanel').classList.toggle('collapsed');
}

function toggleEmoji() {
  emojiPicker.classList.toggle('open');
}

function addEmoji(emoji) {
  chatInput.value += emoji;
  chatInput.focus();
}

// ===== AUTO-JOIN FROM URL =====
function boot() {
  const params = new URLSearchParams(location.search);
  const autoRoom = params.get('room');
  if (autoRoom) {
    roomInput.value = autoRoom;
    joinRoom();
  } else {
    editor.value = currentCode;
    updateGutter();
    runPreview();
    setStatus('enter a room to start', 'relay-unconfigured');
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
</script>
